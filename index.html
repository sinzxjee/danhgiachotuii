<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meow Feedback - Dịch vụ từ tâm</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Hiệu ứng mèo theo chuột -->
    <div id="cursor-follower">🐱</div>

    <div class="container">
        <header>
            <div class="mascot-box">
                <img src="https://cataas.com/cat/cute" alt="Mascot" id="cat-mascot">
                <div class="bubble" id="chat-bubble">Chào em! Dịch vụ hôm nay có làm em vui không z?</div>
            </div>
            <h1>Phản Hồi Của YNhi</h1>
        </header>

        <main class="form-container">
            <div class="input-field">
                <label>📍 Tên dịch vụ:</label>
                <input type="text" id="service" placeholder="VD: Đưa đi làm, ... (Sẽ cập nhật thêmm)">
            </div>

            <div class="star-rating">
                <div class="stars" id="stars">
                    <span data-v="5">★</span><span data-v="4">★</span><span data-v="3">★</span><span data-v="2">★</span><span data-v="1">★</span>
                </div>
                <p id="star-desc">Đánh giá cho anh nhé</p>
            </div>

            <div class="input-field">
                <label>💬 Nhận xét của Em:</label>
                <textarea id="comment" placeholder="Hãy viết gì đó thật tâm nhé..."></textarea>
            </div>

            <button id="send-btn">Ấn vào đây nữa là xong nè 🐾</button>
        </main>

    </div>

    <script src="script.js"></script>
</body>
</html>
